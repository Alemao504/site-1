        <h2 class="titulo_segundario">Entre em contato: </h2>
            <form action="processa.php" method="POST" autocomplete="off">
                <label for="nomepessoa">Nome:</label>
                <input type="text" name="Nomepessoa" 
                id nome="nomepessoa" minlength="3" maxlength="15"
                required placeholder="Nome"><br><br>
                
                
                <label for="email">Email: </label>
                <input type="email" name="email" id="email"
                required placeholder="E-mail"><br><br>

                <label for="Ano">Ano de nascimento: </label>
                <input type="number" id="ano" name="ano" max="2026" min="1900"
                placeholder="Informe seu ano de nascimento"><br><br>

                <label for="telefone">Telefone</label>
                <input type="tel" name="telefone" id="telefone"
                placeholder="Informe seu numero de telefone"><br><br>

                <label for="github">Informe seu Github: </label>
                <input typer="url" name="github" id="github"
                placeholder="Informe seu github"><br><br>

                <label for="senha">Informe sua senha:</label>
                <input type="password" id="senha" name="senha"
                placeholder="Senha"><br><br>

                <label for="arquivo">Anexe um arquivo:</label>
                <input type="file" id="arquivo" name="arquivo"><br><br>

                <label for="cor">Informe uma cor:</label>
                <input type="color" id="cor" name="cor"><br><br>

                <fieldset>

                    <label for="data">Iforme a data:</label>
                    <input type="date" name="data" id="data"><br><br>

                    <label for="mes">Informe o mes:</label>
                    <input type="month" name="mes" id="mes"><br><br>

                    <label for="semana">Informe a semana:</label>
                    <input type="week" name="semana" id="semana"><br><br>

                    <label for="hora">Informe a hora:</label>
                    <input type="time" name="hora" id="hora"><br><br>

                    <label for="datahora">Data e hora atual</label>
                    <input type="datetime-local" name="datahora" id="datahora"><br><br>

                </fieldset><br><br>

                <label for="pesquisa">Pesquisa</label>
                <input type="search" name="pesquisa" id="pesquisa"><br><br>
                
                <label for="descricao">Infome o que você gosta nos filmes:</label><br>
                <textarea cols="30"  rows="10" name="descricao" id="descricao">
                </textarea><br><br>
                <fieldset>
                    
                    <legend>Qual seu filme favorito?</legend>
                    <label for="filme1"><input type="radio" name="filme" id="filme1" value="filme 1">Filme 1</label>
                    <label for="filme2"><input checked type="radio" name="filme" id="filme2" value="filme 2">Filme 2</label>
                    <label for="filme3"><input type="radio" name="filme" id="filme3" value="filme 3">Filme 3</label>

                </fieldset>   

                
                <select>

                    <option selected value="filme 1">Filme 1</option>
                    <option value="filme 2">Filme 2</option>
                    <option value="filme 3">Filme 3</option>

                </select>

                <button type="reset">Limpar</button>
                <button type="submit">Enviar</button>
            
            </form>
            
</body>
